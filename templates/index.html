<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud Call Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1 class="title">📞 Fraud Call Detector</h1>
            <p class="subtitle">Paste call text below and we'll analyze it for fraud signals.</p>
            
            <form method="POST">
                <textarea name="speech_text" placeholder="Paste or type call text here..." required></textarea>
                <button type="submit">🔍 Analyze Call</button>
            </form>
            
            {% if result %}
            <div class="result">
                <h2>{{ result }}</h2>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
