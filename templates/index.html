<!DOCTYPE html>
<html>
<head>
    <title>Fraud Call Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>📞 Fraud Call Detector</h1>

    <form method="POST">
        <textarea name="speech_text" placeholder="Paste or type call text here..." required></textarea>
        <br>
        <button type="submit">Analyze Call</button>
    </form>

    {% if result %}
        <h2>{{ result }}</h2>
    {% endif %}
</div>

</body>
</html>
